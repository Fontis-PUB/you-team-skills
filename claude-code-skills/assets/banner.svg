<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a18"/>
      <stop offset="100%" stop-color="#130f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="accent-r" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb-left" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb-right" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>
  <!-- Ambient orbs -->
  <rect width="1280" height="320" fill="url(#orb-left)"/>
  <rect width="1280" height="320" fill="url(#orb-right)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>
  <!-- Bottom accent line -->
  <rect x="0" y="317" width="1280" height="3" fill="url(#accent-r)"/>

  <!-- Subtle dot grid (background texture) -->
  <g opacity="0.12" fill="#a855f7">
    <circle cx="80" cy="50" r="1.5"/><circle cx="160" cy="50" r="1.5"/><circle cx="240" cy="50" r="1.5"/>
    <circle cx="80" cy="120" r="1.5"/><circle cx="160" cy="120" r="1.5"/><circle cx="240" cy="120" r="1.5"/>
    <circle cx="80" cy="190" r="1.5"/><circle cx="160" cy="190" r="1.5"/><circle cx="240" cy="190" r="1.5"/>
    <circle cx="80" cy="260" r="1.5"/><circle cx="160" cy="260" r="1.5"/><circle cx="240" cy="260" r="1.5"/>
    <circle cx="1040" cy="50" r="1.5"/><circle cx="1120" cy="50" r="1.5"/><circle cx="1200" cy="50" r="1.5"/>
    <circle cx="1040" cy="120" r="1.5"/><circle cx="1120" cy="120" r="1.5"/><circle cx="1200" cy="120" r="1.5"/>
    <circle cx="1040" cy="190" r="1.5"/><circle cx="1120" cy="190" r="1.5"/><circle cx="1200" cy="190" r="1.5"/>
    <circle cx="1040" cy="260" r="1.5"/><circle cx="1120" cy="260" r="1.5"/><circle cx="1200" cy="260" r="1.5"/>
  </g>

  <!-- Grid icon (3x3) — left side -->
  <g filter="url(#glow-sm)" transform="translate(148, 108)">
    <!-- Row 1 -->
    <rect x="0"  y="0"  width="22" height="22" rx="4" fill="#7c3aed" opacity="0.9"/>
    <rect x="28" y="0"  width="22" height="22" rx="4" fill="#9333ea" opacity="0.75"/>
    <rect x="56" y="0"  width="22" height="22" rx="4" fill="#a855f7" opacity="0.6"/>
    <!-- Row 2 -->
    <rect x="0"  y="28" width="22" height="22" rx="4" fill="#9333ea" opacity="0.75"/>
    <rect x="28" y="28" width="22" height="22" rx="4" fill="#7c3aed" opacity="1"/>
    <rect x="56" y="28" width="22" height="22" rx="4" fill="#06b6d4" opacity="0.6"/>
    <!-- Row 3 -->
    <rect x="0"  y="56" width="22" height="22" rx="4" fill="#a855f7" opacity="0.6"/>
    <rect x="28" y="56" width="22" height="22" rx="4" fill="#06b6d4" opacity="0.6"/>
    <rect x="56" y="56" width="22" height="22" rx="4" fill="#7c3aed" opacity="0.8"/>
  </g>

  <!-- Main title -->
  <text x="640" y="128" text-anchor="middle"
    font-family="ui-monospace,'Cascadia Code','Fira Code',monospace"
    font-size="64" font-weight="700" letter-spacing="-1"
    fill="white" filter="url(#glow-soft)">you-team-skills</text>

  <!-- Subtitle EN -->
  <text x="640" y="180" text-anchor="middle"
    font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="19" font-weight="500"
    fill="#c084fc">56 Claude Code Skills · Your Complete Business Team</text>

  <!-- Subtitle PT-BR -->
  <text x="640" y="208" text-anchor="middle"
    font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="16" font-weight="400"
    fill="#7c6d9a">56 Skills para Claude Code · Seu Time Completo de Neg&#xF3;cio</text>

  <!-- Divider line -->
  <rect x="390" y="232" width="500" height="1" fill="url(#accent)" opacity="0.4"/>

  <!-- Stats -->
  <text x="640" y="264" text-anchor="middle"
    font-family="ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="13" letter-spacing="0.5"
    fill="#6b7280">56 specialists&#160;&#160;&#183;&#160;&#160;8 areas&#160;&#160;&#183;&#160;&#160;6 handoff chains&#160;&#160;&#183;&#160;&#160;Brazilian market benchmarks&#160;&#160;&#183;&#160;&#160;$0 forever</text>

  <!-- Corner decorative lines -->
  <line x1="30" y1="20" x2="30" y2="60" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="30" x2="60" y2="30" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <line x1="1250" y1="20" x2="1250" y2="60" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="1220" y1="30" x2="1260" y2="30" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="30" y1="260" x2="30" y2="300" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <line x1="20" y1="290" x2="60" y2="290" stroke="#7c3aed" stroke-width="1.5" opacity="0.5"/>
  <line x1="1250" y1="260" x2="1250" y2="300" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
  <line x1="1220" y1="290" x2="1260" y2="290" stroke="#06b6d4" stroke-width="1.5" opacity="0.5"/>
</svg>
